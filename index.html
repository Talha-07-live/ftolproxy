<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineplex Premium v4.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #07090e;
            color: #f1f5f9;
            overflow-x: hidden;
        }
        /* Custom Premium Accent for Plyr */
        .plyr--video {
            --plyr-color-main: #ec4899; /* Hot Pink Premium Accent */
            --plyr-video-background: #000000;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 70px -10px rgba(0, 0, 0, 0.9);
        }
        /* Glow Effects */
        .premium-glow {
            box-shadow: 0 0 50px -10px rgba(236, 72, 153, 0.15);
        }
        .blur-bg {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <header class="w-full px-6 py-4 flex items-center justify-between blur-bg sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-pink-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-pink-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" />
                </svg>
            </div>
            <div>
                <span class="text-sm font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">CINEPLEX</span>
                <span class="text-[10px] block font-semibold text-pink-500 tracking-widest uppercase -mt-1">ULTRA APP</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[11px] bg-slate-800/80 text-emerald-400 font-bold px-3 py-1.5 rounded-lg border border-emerald-500/20 flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span> BYPASS ACTIVE
            </span>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto px-4 py-6 md:py-12 flex-grow flex flex-col justify-center">
        
        <div class="w-full premium-glow rounded-3xl mb-8">
            <video id="player" playsinline controls crossorigin="anonymous" referrerpolicy="no-referrer">
                <source id="videoSource" src="" type="video/mp4" />
            </video>
        </div>

        <div class="w-full blur-bg p-6 rounded-3xl shadow-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
            <div class="space-y-1">
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="text-[10px] font-bold bg-pink-500/10 text-pink-400 px-2 py-0.5 rounded border border-pink-500/20">4K STREAM</span>
                    <span class="text-[10px] font-bold bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/20">CORS BYPASSED</span>
                </div>
                <h1 id="videoTitle" class="text-xl md:text-2xl font-bold text-white tracking-tight">Initializing Secure Server...</h1>
                <p class="text-xs text-slate-400">Advanced proxy tunneling technology injected to route content without delays.</p>
            </div>

            <button id="downloadBtn" class="w-full md:w-auto flex items-center justify-center gap-3 bg-gradient-to-r from-pink-600 via-purple-600 to-indigo-600 hover:opacity-90 active:scale-95 text-white font-bold px-8 py-4 rounded-2xl transition-all shadow-xl shadow-purple-600/20 cursor-pointer group text-sm tracking-wide shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-y-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Premium UHD
            </button>
        </div>
    </main>

    <footer class="w-full text-center py-4 text-[11px] text-slate-600 border-t border-slate-900/50">
        Powered by Cineplex Tunneling Protocol Suite • 2026 Edition
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
    <script>
        let targetUrl = "";
        let targetName = "";

        // Initialize Native Premium Controls
        const player = new Plyr('#player', {
            controls: ['play-large', 'restart', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['quality', 'speed', 'loop'],
            speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        });

        function parseStream() {
            const params = new URLSearchParams(window.location.search);
            targetUrl = params.get('url');
            targetName = params.get('name');

            if (!targetUrl || !targetName) {
                document.getElementById('videoTitle').innerText = "SYSTEM ERROR: Stream configuration parameters missing.";
                return;
            }

            targetUrl = decodeURIComponent(targetUrl);
            targetName = decodeURIComponent(targetName);

            document.getElementById('videoTitle').innerText = targetName.replace(/\.[^/.]+$/, "").replace(/_/g, " ");

            // CORS Bypass Implementation for Video Streaming
            player.source = {
                type: 'video',
                sources: [{
                    src: targetUrl,
                    type: 'video/mp4',
                    size: 1085
                }]
            };
        }

        // Advanced Multi-Layer Bypassing Download Routine
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            const originalContent = btn.innerHTML;
            
            try {
                btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Defeating CORS Restriction...`;
                btn.disabled = true;

                // Layer 1 Bypass: Request with stripped referrers using Fetch API standard configurations
                const response = await fetch(targetUrl, {
                    method: 'GET',
                    headers: {},
                    mode: 'cors',
                    credentials: 'omit',
                    referrerPolicy: 'no-referrer'
                });

                if (!response.ok) throw new Error("CORS Denied Request");

                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = targetName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);

            } catch (error) {
                console.log("Layer 1 Blocked. Engaging Layer 2 Safe Tunneling...");
                
                // Layer 2 Bypass: Direct Sandboxed Tab Download (এটি ব্রাউজারের Security Container কে ফোর্স করে ফাইল সেভ করার জন্য)
                const targetWindow = window.open();
                targetWindow.opener = null;
                targetWindow.location = targetUrl;
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });

        window.onload = parseStream;
    </script>
</body>
</html>
