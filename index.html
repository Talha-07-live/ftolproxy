<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Premium</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
        }
        .plyr--video { --plyr-color-main: #6366f1; border-radius: 16px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 md:p-8">

    <div id="mainContainer" class="w-full max-w-4xl glass-card p-5 md:p-8 rounded-3xl shadow-2xl">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2">
                <div class="h-3 w-3 rounded-full bg-indigo-500 animate-pulse"></div>
                <span class="text-xs font-bold tracking-widest text-indigo-400 uppercase">StreamHub Premium</span>
            </div>
            <span class="text-xs bg-slate-700/50 border border-slate-600/50 px-3 py-1 rounded-full text-slate-300 font-medium">Direct Stream</span>
        </div>

        <h1 id="videoTitle" class="text-2xl md:text-3xl font-bold mb-6 text-white tracking-tight">Loading Media...</h1>

        <div class="overflow-hidden rounded-2xl bg-black mb-8 border border-slate-700/50">
            <video id="player" playsinline controls crossorigin="anonymous">
                <source id="videoSource" src="" type="video/mp4" />
            </video>
        </div>

        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 p-4 rounded-2xl bg-slate-900/60 border border-slate-800">
            <div>
                <p class="text-sm font-semibold text-slate-200">High-Speed Mirror</p>
                <p class="text-xs text-slate-400 mt-0.5">Click below to download the file directly</p>
            </div>
            <button id="downloadBtn" class="w-full sm:w-auto flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold px-8 py-3.5 rounded-xl transition-all active:scale-95 shadow-lg cursor-pointer text-sm">
                Download Now
            </button>
        </div>
    </div>

    <script>
        let rawUrl = "";
        let rawName = "";

        // Player Init
        const player = new Plyr('#player', { 
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'] 
        });

        function initApp() {
            const params = new URLSearchParams(window.location.search);
            rawUrl = params.get('url');
            rawName = params.get('name');

            if (!rawUrl || !rawName) {
                document.getElementById('videoTitle').innerText = "Error: Link or Name missing in URL!";
                return;
            }

            // Title Update
            document.getElementById('videoTitle').innerText = decodeURIComponent(rawName).replace(/\.[^/.]+$/, "").replace(/_/g, " ");

            // Source Load
            player.source = {
                type: 'video',
                sources: [{ src: decodeURIComponent(rawUrl), type: 'video/mp4' }]
            };
        }

        // Simple Download Trigger
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const a = document.createElement('a');
            a.href = decodeURIComponent(rawUrl);
            a.download = decodeURIComponent(rawName);
            a.target = '_blank'; // কোনো কোনো ব্রাউজারে ব্লকিং এড়াতে নতুন ট্যাবে ওপেন হবে
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        window.onload = initApp;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.min.js"></script>
</body>
</html>
