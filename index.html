<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Talha's Premium Master Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
        body, html {
            width: 100%; height: 100%; background: #000;
            overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .player-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; background: #020206;
        }

        video {
            width: 100%; height: 100%; object-fit: contain; z-index: 1;
        }

        .player-controls {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2,2,6,0.7) 0%, transparent 25%, transparent 75%, rgba(2,2,6,0.95) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; padding: 20px;
        }
        
        .player-controls.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .top-bar {
            display: flex; justify-content: space-between; align-items: center; width: 100%;
        }
        
        .live-tag {
            background: #ff0055; color: #fff; font-size: 11px; font-weight: 800;
            padding: 5px 12px; border-radius: 6px; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(255,0,85,0.5); display: flex; align-items: center; gap: 6px;
        }
        
        .live-tag::before {
            content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            animation: blink 1s infinite alternate;
        }
        
        .buffer-status-badge {
            background: rgba(122, 60, 255, 0.15); border: 1px solid rgba(122, 60, 255, 0.35);
            color: #00f2fe; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 8px;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.4); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65px; height: 65px; background: rgba(122, 60, 255, 0.2);
            border: 2px solid #7a3cff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #fff; font-size: 24px;
            cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            opacity: 0; pointer-events: none;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 6; 
            box-shadow: 0 0 30px rgba(122,60,255,0.4);
        }
        
        .center-btn.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .seek-ripple {
            position: absolute; width: 40%; height: 100%; top: 0;
            background: rgba(255, 255, 255, 0.08); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: #fff; font-size: 14px; font-weight: bold; opacity: 0;
            pointer-events: none; z-index: 4; transition: opacity 0.2s;
        }
        .seek-ripple.left { left: 0; border-radius: 0 100px 100px 0; }
        .seek-ripple.right { right: 0; border-radius: 100px 0 0 100px; }
        .seek-ripple i { font-size: 24px; margin-bottom: 8px; }

        .bottom-bar {
            width: 100%; display: flex; flex-direction: column; gap: 12px;
        }

        .progress-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.08);
            border-radius: 10px; position: relative; cursor: pointer; transition: height 0.1s;
        }
        .progress-container:hover { height: 9px; }
        
        .progress-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #7a3cff, #00f2fe); border-radius: 10px; z-index: 3;
        }
        
        .buffer-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(255, 255, 255, 0.22); border-radius: 10px; z-index: 2;
            transition: width 0.3s ease;
        }

        .control-row {
            display: flex; justify-content: space-between; align-items: center; color: #fff;
        }
        
        .left-controls, .right-controls {
            display: flex; align-items: center; gap: 22px;
        }
        
        .control-btn {
            background: none; border: none; color: #fff; font-size: 17px; cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover { color: #00f2fe; filter: drop-shadow(0 0 8px #00f2fe); }
        
        .time-display { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.65); letter-spacing: 0.5px; }

        .spinner {
            position: absolute; width: 55px; height: 55px;
            border: 4px solid rgba(0, 242, 254, 0.08); border-top-color: #00f2fe;
            border-radius: 50%; animation: spin 0.7s linear infinite; display: none; z-index: 10;
            filter: drop-shadow(0 0 15px #00f2fe);
        }

        .settings-panel {
            position: absolute; bottom: 70px; right: 20px;
            background: rgba(10, 10, 20, 0.95); border: 1px solid rgba(122, 60, 255, 0.5);
            border-radius: 12px; width: 160px; display: none; flex-direction: column;
            overflow-y: auto; max-height: 200px; z-index: 12; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .settings-panel.active { display: flex; }
        .settings-panel button {
            background: none; border: none; color: #fff; padding: 12px 16px;
            text-align: left; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .settings-panel button:hover { background: rgba(122, 60, 255, 0.3); color: #00f2fe; }
        .settings-panel button.selected { color: #00f2fe; font-weight: 700; }
        .settings-panel button.selected::after { content: '✓'; font-weight: bold; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes blink { from { opacity: 0.3; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="player-wrapper" id="playerContainer">
    
    <div class="spinner" id="loadingSpinner"></div>
    
    <div class="seek-ripple left" id="rippleLeft"><i class="fas fa-backward"></i>10s</div>
    <div class="seek-ripple right" id="rippleRight"><i class="fas fa-forward"></i>10s</div>

    <div class="center-btn" id="midPlayBtn">
        <i class="fas fa-play"></i>
    </div>

    <video id="videoEngine" playsinline webkit-playsinline></video>

    <div class="settings-panel" id="settingsPanel"></div>

    <div class="player-controls" id="controlOverlay">
        
        <div class="top-bar">
            <div class="live-tag" id="liveTag">LIVE</div>
            <div class="buffer-status-badge" id="bufferStats">Syncing...</div>
        </div>

        <div class="bottom-bar">
            
            <div class="progress-container" id="timeline">
                <div class="buffer-bar" id="bufferedTimeline"></div>
                <div class="progress-bar" id="currentTimeline"></div>
            </div>

            <div class="control-row">
                <div class="left-controls">
                    <button class="control-btn" id="playNavBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                    <div class="time-display" id="timeShow">00:00 / Syncing Stream</div>
                </div>
                <div class="right-controls">
                    <button class="control-btn" style="display:none; color:#00f2fe; font-weight:700;" id="premiumDlBtn"><i class="fas fa-download"></i> DOWNLOAD</button>
                    <button class="control-btn" style="font-size:12px; font-weight:700;" id="goLiveBtn"><i class="fas fa-satellite-dish" style="color:#ff0055;"></i>GO LIVE</button>
                    <button class="control-btn" id="gearBtn"><i class="fas fa-cog"></i></button>
                    <button class="control-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
                </div>
            </div>

        </div>

    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // ডায়নামিক সোর্স ডিটেকশন ইঞ্জিন
        const channelId = urlParams.get('Talha');
        let rawUrl = urlParams.get('url');
        let customFileName = urlParams.get('name') || "Premium_Video.mp4";

        let videoSrc = "";
        let isLiveStream = true;

        if (channelId) {
            videoSrc = `https://m3u8-proxy-r8j3.vercel.app/checklist/${channelId}.m3u8`;
            isLiveStream = true;
        } else if (rawUrl) {
            videoSrc = decodeURIComponent(rawUrl);
            customFileName = decodeURIComponent(customFileName);
            isLiveStream = false;
        } else {
            // ডিফল্ট সোর্স যদি কিছু না পাওয়া যায়
            videoSrc = `https://m3u8-proxy-r8j3.vercel.app/checklist/androstreamlivetrt1.m3u8`;
            isLiveStream = true;
        }

        const video = document.getElementById('videoEngine');
        const spinner = document.getElementById('loadingSpinner');
        const midPlayBtn = document.getElementById('midPlayBtn');
        const playNavBtn = document.getElementById('playNavBtn');
        const muteBtn = document.getElementById('muteBtn');
        const bufferStats = document.getElementById('bufferStats');
        const currentTimeline = document.getElementById('currentTimeline');
        const bufferedTimeline = document.getElementById('bufferedTimeline');
        const timeShow = document.getElementById('timeShow');
        const controlOverlay = document.getElementById('controlOverlay');
        const playerContainer = document.getElementById('playerContainer');
        const timeline = document.getElementById('timeline');
        const goLiveBtn = document.getElementById('goLiveBtn');
        const fullScreenBtn = document.getElementById('fullScreenBtn');
        const gearBtn = document.getElementById('gearBtn');
        const settingsPanel = document.getElementById('settingsPanel');
        const premiumDlBtn = document.getElementById('premiumDlBtn');
        const liveTag = document.getElementById('liveTag');

        let hlsEngine = null;
        let controlsTimeout;
        let isSeeking = false;
        let lastTap = 0;

        // মোড অনুযায়ী UI কনফিগারেশন পরিবর্তন
        if (!isLiveStream) {
            liveTag.style.display = 'none';
            goLiveBtn.style.display = 'none';
            premiumDlBtn.style.display = 'block';
        }

        if (typeof Hls !== 'undefined' && Hls.isSupported() && (videoSrc.includes('.m3u8') || isLiveStream)) {
            const hlsConfig = {
                maxBufferLength: 60,             
                maxMaxBufferLength: 120,         
                liveBackBufferLength: 60,        
                enableWorker: true,
                lowLatencyMode: false,            
                liveSyncDuration: 120, 
                manifestLoadingTimeOut: 15000,
                manifestLoadingMaxRetry: 5,
                fragLoadingTimeOut: 20000,
                fragLoadingMaxRetry: 5,
                levelLoadingTimeOut: 15000,
                levelLoadingMaxRetry: 5,
                abrEwmaFastLive: 2.0,
                abrEwmaSlowLive: 9.0,
                testBandwidth: true
            };

            const hls = new Hls(hlsConfig);
            hlsEngine = hls;
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                hls.currentLevel = -1;
                video.play().catch(() => showControls());
                setTimeout(setupQualityMenu, 1000);
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                        case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                        default: hls.recoverMediaError(); break;
                    }
                }
            });

        } else {
            // MP4 ফাইল অথবা সাধারণ ব্রাউজার/iOS সাফারির জন্য ডিরেক্ট ইঞ্জিন
            video.src = videoSrc;
            gearBtn.style.display = 'none';
            video.addEventListener('loadedmetadata', () => {
                video.play().catch(() => showControls());
            });
        }

        video.addEventListener('waiting', () => spinner.style.display = 'block');
        video.addEventListener('playing', () => spinner.style.display = 'none');
        video.addEventListener('stalled', () => {
            spinner.style.display = 'block';
            if(hlsEngine) hlsEngine.startLoad(); 
        });

        // ইউনিভার্সাল টাইম ও টাইমলাইন লুপ (লাইভ এবং ভিডিও ফাইল উভয়ের জন্য ১০০% রেডি)
        setInterval(() => {
            if (video.buffered.length > 0 && !isSeeking) {
                const currentTime = video.currentTime;
                let start = 0;
                let end = video.duration || currentTime;

                if (isLiveStream && hlsEngine && hlsEngine.liveSyncPosition) {
                    start = hlsEngine.liveSyncPosition - 300;
                    end = hlsEngine.liveSyncPosition;
                }
                if(start < 0) start = 0;
                
                let totalWindow = end - start;
                let currentPos = currentTime - start;
                if(currentPos < 0) currentPos = 0;

                const currentPercent = totalWindow > 0 ? (currentPos / totalWindow) * 100 : 0;
                currentTimeline.style.width = Math.min(currentPercent, 100) + "%";

                let activeBufferEnd = currentTime;
                for (let i = 0; i < video.buffered.length; i++) {
                    if (video.buffered.start(i) <= currentTime && video.buffered.end(i) >= currentTime) {
                        activeBufferEnd = video.buffered.end(i);
                    }
                }
                
                let bufferPos = activeBufferEnd - start;
                const bufferPercent = totalWindow > 0 ? (bufferPos / totalWindow) * 100 : 0;
                bufferedTimeline.style.width = Math.min(bufferPercent, 100) + "%";

                const aheadAmount = activeBufferEnd - currentTime;
                bufferStats.innerText = `Buffer: ${Math.round(Math.max(0, aheadAmount))}s`;
                
                if (isLiveStream) {
                    timeShow.innerText = `${formatTime(currentTime)} / Live Stream`;
                } else {
                    timeShow.innerText = `${formatTime(currentTime)} / ${formatTime(video.duration)}`;
                }
            }
        }, 400);

        function setupQualityMenu() {
            if (!hlsEngine || !hlsEngine.levels || hlsEngine.levels.length === 0) {
                gearBtn.style.display = 'none'; 
                return;
            }
            
            gearBtn.style.display = 'block';
            let menuHtml = `<button class="quality-btn selected" data-level="-1">Auto</button>`;
            
            hlsEngine.levels.forEach((level, index) => {
                let name = level.name || (level.height ? `${level.height}p` : `Stream ${index + 1}`);
                menuHtml += `<button class="quality-btn" data-level="${index}">${name}</button>`;
            });
            
            settingsPanel.innerHTML = menuHtml;

            document.querySelectorAll('.quality-btn').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    const level = parseInt(this.getAttribute('data-level'));
                    hlsEngine.currentLevel = level; 
                    settingsPanel.classList.remove('active');
                };
            });
        }

        gearBtn.onclick = function(e) {
            e.stopPropagation();
            settingsPanel.classList.toggle('active');
        };

        function togglePlay() {
            settingsPanel.classList.remove('active');
            if (video.paused) { video.play().catch(() => {}); } else { video.pause(); }
        }

        video.addEventListener('play', () => {
            midPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-pause"></i>';
            resetControlsTimeout();
        });

        video.addEventListener('pause', () => {
            midPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
            playNavBtn.innerHTML = '<i class="fas fa-play"></i>';
            showControls();
        });

        function toggleMute() {
            if (video.muted) {
                video.muted = false;
                muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            } else {
                video.muted = true;
                muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            }
        }

        function seekVideo(e) {
            const rect = timeline.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            if (!clientX) return;
            
            const pos = (clientX - rect.left) / rect.width;
            let start = 0;
            let end = video.duration || video.currentTime;

            if (isLiveStream && hlsEngine && hlsEngine.liveSyncPosition) {
                start = hlsEngine.liveSyncPosition - 300;
                end = hlsEngine.liveSyncPosition;
            }
            if(start < 0) start = 0;
            
            isSeeking = true;
            video.currentTime = start + (pos * (end - start));
            setTimeout(() => { isSeeking = false; }, 300);
        }

        function goLive() {
            if (hlsEngine && hlsEngine.liveSyncPosition) {
                video.currentTime = hlsEngine.liveSyncPosition - 10; 
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerContainer.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function showControls() {
            clearTimeout(controlsTimeout);
            controlOverlay.classList.add('show-controls');
            midPlayBtn.classList.add('show-controls');
        }

        function hideControls() {
            if (!video.paused) {
                controlOverlay.classList.remove('show-controls');
                midPlayBtn.classList.remove('show-controls');
                settingsPanel.classList.remove('active');
            }
        }

        function resetControlsTimeout() {
            showControls();
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(hideControls, 3000);
        }

        playerContainer.addEventListener('touchend', (e) => {
            if (e.target.closest('.control-btn') || e.target.closest('.progress-container') || e.target.closest('#midPlayBtn') || e.target.closest('#settingsPanel')) {
                resetControlsTimeout();
                return;
            }

            const now = new Date().getTime();
            const timesince = now - lastTap;
            
            if (timesince < 300 && timesince > 0) {
                const touchX = e.changedTouches[0].clientX;
                const width = window.innerWidth;
                
                if (touchX > width / 2) {
                    video.currentTime = Math.min(video.currentTime + 10, video.duration || video.currentTime + 10);
                    triggerRipple('right');
                } else {
                    video.currentTime = Math.max(video.currentTime - 10, 0);
                    triggerRipple('left');
                }
            } else {
                if (controlOverlay.classList.contains('show-controls')) {
                    hideControls();
                } else {
                    resetControlsTimeout();
                }
            }
            lastTap = now;
        });

        function triggerRipple(side) {
            const ripple = document.getElementById(side === 'right' ? 'rippleRight' : 'rippleLeft');
            ripple.style.opacity = '1';
            setTimeout(() => { ripple.style.opacity = '0'; }, 400);
        }

        // ====================================================================
        // 🔮 HIGH-SPEED BLOB DOWNLOAD ENGINE (VERCEL SAFE & NO ERROR)
        // ====================================================================
        premiumDlBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const btn = this;
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> SAVING...`;
            btn.style.opacity = "0.6";
            btn.style.pointerEvents = "none";

            try {
                // অল-অরিজিন প্রক্সি ট্রিক দিয়ে ডাটা ব্লক এড়ানো হচ্ছে
                const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(videoSrc);
                const resp = await fetch(proxyUrl);
                if (!resp.ok) throw new Error("Proxy Restriction");
                
                const fileBlob = await resp.blob();
                const localBlobUrl = window.URL.createObjectURL(fileBlob);
                
                const dlGate = document.createElement('a');
                dlGate.href = localBlobUrl;
                dlGate.download = customFileName; // কাস্টম নাম জোরপূর্বক পুশ করা হলো
                document.body.appendChild(dlGate);
                dlGate.click();
                
                document.body.removeChild(dlGate);
                window.URL.revokeObjectURL(localBlobUrl);
            } catch (err) {
                // সিকিউর ফলব্যাক: প্রক্সি ডাউন থাকলেও ব্রাউজার প্রম্পটে ফোর্স ডাউনলোড করাবে
                const fallbackGate = document.createElement('a');
                fallbackGate.href = videoSrc;
                fallbackGate.download = customFileName;
                document.body.appendChild(fallbackGate);
                fallbackGate.click();
                document.body.removeChild(fallbackGate);
            } finally {
                btn.innerHTML = originalHtml;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            }
        });

        midPlayBtn.onclick = togglePlay;
        playNavBtn.onclick = togglePlay;
        muteBtn.onclick = toggleMute;
        timeline.onclick = seekVideo;
        goLiveBtn.onclick = goLive;
        fullScreenBtn.onclick = toggleFullscreen;
        playerContainer.addEventListener('mousemove', resetControlsTimeout);
        
        document.addEventListener('click', function(e) {
            if (!gearBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
                settingsPanel.classList.remove('active');
            }
        });
    };
</script>
</body>
</html>
