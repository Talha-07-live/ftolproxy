<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talha's Premium Master Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #05070f;
            color: #f1f5f9;
            user-select: none;
            -webkit-user-select: none;
        }
        * {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
        .premium-glow {
            box-shadow: 0 25px 60px -15px rgba(122, 60, 255, 0.25);
        }
        .blur-panel {
            background: rgba(13, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* প্লেয়ার কন্টেইনার স্টাইল */
        .player-wrapper {
            position: relative; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
            background: #020206;
        }

        video {
            width: 100%; height: 100%; object-fit: contain; z-index: 1;
        }

        .player-controls {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2,2,6,0.5) 0%, transparent 25%, transparent 75%, rgba(2,2,6,0.95) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; padding: 15px;
        }
        
        .player-controls.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .center-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 55px; height: 55px; background: rgba(122, 60, 255, 0.2);
            border: 2px solid #7a3cff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #fff; font-size: 20px;
            cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); 
            opacity: 0; pointer-events: none;
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 6; 
            box-shadow: 0 0 30px rgba(122,60,255,0.4);
        }
        
        .center-btn.show-controls {
            opacity: 1 !important; pointer-events: auto !important;
        }

        .seek-ripple {
            position: absolute; width: 35%; height: 100%; top: 0;
            background: rgba(255, 255, 255, 0.08); display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            color: #fff; font-size: 12px; font-weight: bold; opacity: 0;
            pointer-events: none; z-index: 4; transition: opacity 0.2s;
        }
        .seek-ripple.left { left: 0; border-radius: 0 100px 100px 0; }
        .seek-ripple.right { right: 0; border-radius: 100px 0 0 100px; }
        .seek-ripple i { font-size: 20px; margin-bottom: 6px; }

        .progress-container {
            width: 100%; height: 5px; background: rgba(255,255,255,0.08);
            border-radius: 10px; position: relative; cursor: pointer; transition: height 0.1s;
        }
        .progress-container:hover { height: 8px; }
        
        .progress-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #7a3cff, #00f2fe); border-radius: 10px; z-index: 3;
        }
        
        .buffer-bar {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(255, 255, 255, 0.22); border-radius: 10px; z-index: 2;
            transition: width 0.3s ease;
        }

        .control-btn {
            background: none; border: none; color: #fff; font-size: 15px; cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn:hover { color: #00f2fe; filter: drop-shadow(0 0 8px #00f2fe); }

        .spinner {
            position: absolute; width: 45px; height: 45px;
            border: 4px solid rgba(0, 242, 254, 0.08); border-top-color: #00f2fe;
            border-radius: 50%; animation: spin 0.7s linear infinite; display: none; z-index: 10;
            filter: drop-shadow(0 0 15px #00f2fe);
        }

        .settings-panel {
            position: absolute; bottom: 55px; right: 15px;
            background: rgba(10, 10, 20, 0.95); border: 1px solid rgba(122, 60, 255, 0.5);
            border-radius: 12px; width: 150px; display: none; flex-direction: column;
            overflow-y: auto; max-height: 180px; z-index: 12; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .settings-panel.active { display: flex; }
        .settings-panel button {
            background: none; border: none; color: #fff; padding: 10px 14px;
            text-align: left; font-size: 12px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; display: flex; justify-content: space-between; align-items: center;
        }
        .settings-panel button:hover { background: rgba(122, 60, 255, 0.3); color: #00f2fe; }
        .settings-panel button.selected { color: #00f2fe; font-weight: 700; }
        .settings-panel button.selected::after { content: '✓'; font-weight: bold; }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="w-full px-6 py-4 flex items-center justify-between blur-panel border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-2xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                <i class="fas fa-play text-white text-xs animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-widest text-white">TALHA<span class="text-cyan-400">PREMIUM</span></h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-widest font-extrabold -mt-1">Core Engine v8.5</p>
            </div>
        </div>
        <div>
            <span class="text-[10px] bg-cyan-500/10 border border-cyan-500/20 px-3 py-1.5 rounded-xl font-black text-cyan-400 tracking-wider flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-cyan-400 animate-ping"></span> BLOB SECURE
            </span>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-4 py-6 flex-grow flex flex-col justify-center">
        
        <div id="playerContainer" class="player-wrapper relative w-full aspect-video rounded-3xl overflow-hidden group premium-glow border border-white/5">
            
            <div class="spinner" id="loadingSpinner"></div>
            
            <div class="seek-ripple left" id="rippleLeft"><i class="fas fa-backward"></i>10s</div>
            <div class="seek-ripple right" id="rippleRight"><i class="fas fa-forward"></i>10s</div>

            <div class="center-btn" id="midPlayBtn">
                <i class="fas fa-play"></i>
            </div>

            <video id="videoEngine" playsinline webkit-playsinline></video>

            <div class="settings-panel" id="settingsPanel"></div>

            <div class="player-controls" id="controlOverlay">
                <div class="flex justify-between items-center w-full">
                    <div class="bg-rose-600 text-white text-[10px] font-black px-2.5 py-1 rounded shadow-lg flex items-center gap-1.5" id="liveTag">
                        <span class="h-1.5 w-1.5 rounded-full bg-white animate-pulse"></span>LIVE
                    </div>
                    <div class="buffer-status-badge" id="bufferStats">Syncing...</div>
                </div>

                <div class="w-full flex flex-col gap-3">
                    <div class="progress-container" id="timeline">
                        <div class="buffer-bar" id="bufferedTimeline"></div>
                        <div class="progress-bar" id="currentTimeline"></div>
                    </div>

                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <button class="control-btn" id="playNavBtn"><i class="fas fa-play"></i></button>
                            <button class="control-btn" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                            <div class="time-display text-xs text-slate-400 font-semibold" id="timeShow">00:00</div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button class="control-btn text-xs font-bold text-rose-500" id="goLiveBtn"><i class="fas fa-satellite-dish mr-1"></i>GO LIVE</button>
                            <button class="control-btn" id="gearBtn"><i class="fas fa-cog"></i></button>
                            <button class="control-btn" id="fullScreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full blur-panel p-6 rounded-3xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 mt-6">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black tracking-widest bg-purple-500/10 text-purple-400 px-2.5 py-0.5 rounded-md border border-purple-500/20 uppercase">VERCEL COMPATIBLE</span>
                    <span class="text-[9px] font-black tracking-widest bg-emerald-500/10 text-emerald-400 px-2.5 py-0.5 rounded-md border border-emerald-500/20 uppercase">DYNAMIC PROFILE</span>
                </div>
                <h2 id="videoTitle" class="text-xl font-bold text-white tracking-tight">Syncing Stream Core...</h2>
                <p id="fileNameSubtitle" class="text-xs text-slate-400 font-medium break-all max-w-lg">Configuring system variables.</p>
            </div>

            <button id="ultimateDownloadBtn" style="display: none;" class="w-full sm:w-auto flex items-center justify-center gap-3 bg-gradient-to-r from-purple-600 via-pink-600 to-rose-500 hover:opacity-95 active:scale-95 text-white font-bold px-8 py-4 rounded-2xl transition-all shadow-xl shadow-purple-500/25 cursor-pointer text-sm tracking-wide shrink-0 outline-none">
                <i class="fas fa-download"></i> Download Video
            </button>
        </div>
    </main>

    <footer class="w-full text-center py-4 text-[10px] text-slate-600 font-extrabold tracking-widest">
        TALHA MASTER ARCHITECTURE V8.5
    </footer>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            
            const channelId = urlParams.get('Talha');
            let rawUrl = urlParams.get('url');
            let customFileName = urlParams.get('name') || "Premium_Video.mp4";

            let videoSrc = "";
            let isLiveStream = true;

            if (channelId) {
                videoSrc = `https://m3u8-proxy-r8j3.vercel.app/checklist/${channelId}.m3u8`;
                isLiveStream = true;
            } else if (rawUrl) {
                videoSrc = decodeURIComponent(rawUrl);
                customFileName = decodeURIComponent(customFileName);
                isLiveStream = false;
            } else {
                videoSrc = `https://m3u8-proxy-r8j3.vercel.app/checklist/androstreamlivetrt1.m3u8`;
                isLiveStream = true;
            }

            const video = document.getElementById('videoEngine');
            const spinner = document.getElementById('loadingSpinner');
            const midPlayBtn = document.getElementById('midPlayBtn');
            const playNavBtn = document.getElementById('playNavBtn');
            const muteBtn = document.getElementById('muteBtn');
            const bufferStats = document.getElementById('bufferStats');
            const currentTimeline = document.getElementById('currentTimeline');
            const bufferedTimeline = document.getElementById('bufferedTimeline');
            const timeShow = document.getElementById('timeShow');
            const controlOverlay = document.getElementById('controlOverlay');
            const playerContainer = document.getElementById('playerContainer');
            const timeline = document.getElementById('timeline');
            const goLiveBtn = document.getElementById('goLiveBtn');
            const fullScreenBtn = document.getElementById('fullScreenBtn');
            const gearBtn = document.getElementById('gearBtn');
            const settingsPanel = document.getElementById('settingsPanel');
            const ultimateDownloadBtn = document.getElementById('ultimateDownloadBtn');
            const liveTag = document.getElementById('liveTag');
            const videoTitle = document.getElementById('videoTitle');
            const fileNameSubtitle = document.getElementById('fileNameSubtitle');

            let hlsEngine = null;
            let controlsTimeout;
            let isSeeking = false;
            let lastTap = 0;

            // UI মোড সেটআপ
            if (!isLiveStream) {
                liveTag.style.display = 'none';
                goLiveBtn.style.display = 'none';
                ultimateDownloadBtn.style.display = 'flex';
                videoTitle.innerText = customFileName.replace(/\.[^/.]+$/, "").replace(/_/g, " ");
                fileNameSubtitle.innerText = "Target Save Name: " + customFileName;
            } else {
                videoTitle.innerText = channelId ? channelId.toUpperCase() : "LIVE STREAMING";
                fileNameSubtitle.innerText = "Live Broadcast Protocol Active.";
            }

            if (typeof Hls !== 'undefined' && Hls.isSupported() && (videoSrc.includes('.m3u8') || isLiveStream)) {
                const hlsConfig = {
                    maxBufferLength: 60, maxMaxBufferLength: 120, enableWorker: true, liveSyncDuration: 120
                };
                const hls = new Hls(hlsConfig);
                hlsEngine = hls;
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    hls.currentLevel = -1;
                    video.play().catch(() => showControls());
                    setTimeout(setupQualityMenu, 1000);
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                            default: hls.recoverMediaError(); break;
                        }
                    }
                });
            } else {
                video.src = videoSrc;
                gearBtn.style.display = 'none';
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(() => showControls());
                });
            }

            video.addEventListener('waiting', () => spinner.style.display = 'block');
            video.addEventListener('playing', () => spinner.style.display = 'none');

            setInterval(() => {
                if (video.buffered.length > 0 && !isSeeking) {
                    const currentTime = video.currentTime;
                    let start = 0;
                    let end = video.duration || currentTime;

                    if (isLiveStream && hlsEngine && hlsEngine.liveSyncPosition) {
                        start = hlsEngine.liveSyncPosition - 300;
                        end = hlsEngine.liveSyncPosition;
                    }
                    if(start < 0) start = 0;
                    
                    let totalWindow = end - start;
                    let currentPos = currentTime - start;
                    if(currentPos < 0) currentPos = 0;

                    const currentPercent = totalWindow > 0 ? (currentPos / totalWindow) * 100 : 0;
                    currentTimeline.style.width = Math.min(currentPercent, 100) + "%";

                    let activeBufferEnd = currentTime;
                    for (let i = 0; i < video.buffered.length; i++) {
                        if (video.buffered.start(i) <= currentTime && video.buffered.end(i) >= currentTime) {
                            activeBufferEnd = video.buffered.end(i);
                        }
                    }
                    
                    let bufferPos = activeBufferEnd - start;
                    const bufferPercent = totalWindow > 0 ? (bufferPos / totalWindow) * 100 : 0;
                    bufferedTimeline.style.width = Math.min(bufferPercent, 100) + "%";

                    bufferStats.innerText = `Buffer: ${Math.round(Math.max(0, activeBufferEnd - currentTime))}s`;
                    timeShow.innerText = isLiveStream ? `${formatTime(currentTime)} / Live` : `${formatTime(currentTime)} / ${formatTime(video.duration)}`;
                }
            }, 400);

            function setupQualityMenu() {
                if (!hlsEngine || !hlsEngine.levels || hlsEngine.levels.length === 0) return;
                let menuHtml = `<button class="quality-btn selected" data-level="-1">Auto</button>`;
                hlsEngine.levels.forEach((level, index) => {
                    let name = level.name || (level.height ? `${level.height}p` : `Stream ${index + 1}`);
                    menuHtml += `<button class="quality-btn" data-level="${index}">${name}</button>`;
                });
                settingsPanel.innerHTML = menuHtml;
                document.querySelectorAll('.quality-btn').forEach(btn => {
                    btn.onclick = function(e) {
                        e.stopPropagation();
                        document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
                        this.classList.add('selected');
                        hlsEngine.currentLevel = parseInt(this.getAttribute('data-level'));
                        settingsPanel.classList.remove('active');
                    };
                });
            }

            gearBtn.onclick = (e) => { e.stopPropagation(); settingsPanel.classList.toggle('active'); };

            function togglePlay() {
                settingsPanel.classList.remove('active');
                if (video.paused) { video.play().catch(() => {}); } else { video.pause(); }
            }

            video.addEventListener('play', () => {
                midPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
                playNavBtn.innerHTML = '<i class="fas fa-pause"></i>';
                resetControlsTimeout();
            });

            video.addEventListener('pause', () => {
                midPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
                playNavBtn.innerHTML = '<i class="fas fa-play"></i>';
                showControls();
            });

            muteBtn.onclick = () => {
                video.muted = !video.muted;
                muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            };

            timeline.onclick = (e) => {
                const rect = timeline.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                let start = (isLiveStream && hlsEngine && hlsEngine.liveSyncPosition) ? hlsEngine.liveSyncPosition - 300 : 0;
                let end = (isLiveStream && hlsEngine && hlsEngine.liveSyncPosition) ? hlsEngine.liveSyncPosition : video.duration;
                if(start < 0) start = 0;
                isSeeking = true;
                video.currentTime = start + (pos * (end - start));
                setTimeout(() => { isSeeking = false; }, 300);
            };

            goLiveBtn.onclick = () => { if (hlsEngine && hlsEngine.liveSyncPosition) video.currentTime = hlsEngine.liveSyncPosition - 10; };
            fullScreenBtn.onclick = () => {
                if (!document.fullscreenElement) playerContainer.requestFullscreen().catch(() => {});
                else document.exitFullscreen().catch(() => {});
            };

            function formatTime(seconds) {
                if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
                return `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(Math.floor(seconds % 60)).padStart(2, '0')}`;
            }

            function showControls() { clearTimeout(controlsTimeout); controlOverlay.classList.add('show-controls'); midPlayBtn.classList.add('show-controls'); }
            function hideControls() { if (!video.paused) { controlOverlay.classList.remove('show-controls'); midPlayBtn.classList.remove('show-controls'); settingsPanel.classList.remove('active'); } }
            function resetControlsTimeout() { showControls(); clearTimeout(controlsTimeout); controlsTimeout = setTimeout(hideControls, 3000); }

            playerContainer.addEventListener('touchend', (e) => {
                if (e.target.closest('.control-btn') || e.target.closest('.progress-container') || e.target.closest('#midPlayBtn') || e.target.closest('#settingsPanel')) { resetControlsTimeout(); return; }
                const now = new Date().getTime();
                if (now - lastTap < 300 && now - lastTap > 0) {
                    if (e.changedTouches[0].clientX > window.innerWidth / 2) {
                        video.currentTime = Math.min(video.currentTime + 10, video.duration || video.currentTime + 10); triggerRipple('right');
                    } else {
                        video.currentTime = Math.max(video.currentTime - 10, 0); triggerRipple('left');
                    }
                } else {
                    if (controlOverlay.classList.contains('show-controls')) hideControls(); else resetControlsTimeout();
                }
                lastTap = now;
            });

            function triggerRipple(side) { const ripple = document.getElementById(side === 'right' ? 'rippleRight' : 'rippleLeft'); ripple.style.opacity = '1'; setTimeout(() => { ripple.style.opacity = '0'; }, 400); }

            // ====================================================================
            // 🔮 HIGH-SPEED BLOB DOWNLOAD ENGINE (VERCEL SAFE & NO ERROR)
            // ====================================================================
            ultimateDownloadBtn.addEventListener('click', async function() {
                const btn = this;
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Downloading...`;
                btn.style.opacity = "0.6";
                btn.style.pointerEvents = "none";

                try {
                    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(videoSrc);
                    const resp = await fetch(proxyUrl);
                    if (!resp.ok) throw new Error("Proxy offline");
                    const fileBlob = await resp.blob();
                    const localBlobUrl = window.URL.createObjectURL(fileBlob);
                    
                    const dlGate = document.createElement('a');
                    dlGate.href = localBlobUrl;
                    dlGate.download = customFileName;
                    document.body.appendChild(dlGate);
                    dlGate.click();
                    document.body.removeChild(dlGate);
                    window.URL.revokeObjectURL(localBlobUrl);
                } catch (err) {
                    const fallbackGate = document.createElement('a');
                    fallbackGate.href = videoSrc;
                    fallbackGate.download = customFileName;
                    document.body.appendChild(fallbackGate);
                    fallbackGate.click();
                    document.body.removeChild(fallbackGate);
                } finally {
                    btn.innerHTML = originalHtml;
                    btn.style.opacity = "1";
                    btn.style.pointerEvents = "auto";
                }
            });

            midPlayBtn.onclick = togglePlay;
            playNavBtn.onclick = togglePlay;
            playerContainer.addEventListener('mousemove', resetControlsTimeout);
            document.addEventListener('click', (e) => { if (!gearBtn.contains(e.target) && !settingsPanel.contains(e.target)) settingsPanel.classList.remove('active'); });
        };
    </script>
</body>
</html>
