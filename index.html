<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineplex Studio Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #05070f;
            color: #f1f5f9;
            user-select: none;
        }
        .premium-glow {
            box-shadow: 0 25px 60px -15px rgba(244, 63, 94, 0.25);
        }
        .blur-panel {
            background: rgba(13, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Seekbar Custom Styling */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #f43f5e;
            cursor: pointer;
            margin-top: -4.5px;
            box-shadow: 0 0 10px #f43f5e;
        }
        video::-webkit-media-controls { display: none !important; }
        video::-webkit-media-controls-enclosure { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="w-full px-6 py-4 flex items-center justify-between blur-panel border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-2xl bg-gradient-to-tr from-rose-500 via-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-rose-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                </svg>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-widest text-white">CINEPLEX<span class="text-rose-500">ULTRA</span></h1>
                <p class="text-[9px] text-slate-400 uppercase tracking-widest font-extrabold -mt-1">Stable Core Engine v7.0</p>
            </div>
        </div>
        <div>
            <span class="text-[10px] bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-xl font-black text-emerald-400 tracking-wider flex items-center gap-1.5">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span> KERNEL PROXY ACTIVE
            </span>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-4 py-6 flex-grow flex flex-col justify-center">
        
        <div id="videoWrapper" class="relative w-full aspect-video bg-black rounded-3xl overflow-hidden group premium-glow border border-white/5">
            
            <video id="mainPlayer" class="w-full h-full object-contain cursor-pointer" playsinline>
                <source id="videoSource" src="" type="video/mp4" />
            </video>

            <div id="centerOverlay" class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-all duration-300 pointer-events-none">
                <div class="h-16 w-16 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20 transform scale-90 group-hover:scale-100 transition-all">
                    <svg id="centerPlayIcon" xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                    </svg>
                </div>
            </div>

            <div id="customControls" class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black via-black/80 to-transparent p-5 pt-20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col gap-4 z-30">
                
                <div class="flex items-center gap-3 w-full">
                    <span id="currentTime" class="text-xs font-bold text-slate-300 tabular-nums">00:00</span>
                    <input type="range" id="seekBar" min="0" max="100" value="0" class="flex-grow cursor-pointer outline-none">
                    <span id="durationTime" class="text-xs font-bold text-slate-300 tabular-nums">00:00</span>
                </div>

                <div class="flex items-center justify-between w-full">
                    <div class="flex items-center gap-5">
                        <button id="playPauseBtn" class="hover:text-rose-500 text-white transition-colors cursor-pointer outline-none">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
                        </button>

                        <div class="flex items-center gap-2 group/vol">
                            <button id="muteBtn" class="hover:text-rose-500 text-slate-200 transition-colors cursor-pointer outline-none">
                                <svg id="volIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg></button>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" class="w-0 group-hover/vol:w-16 h-1 bg-white/20 rounded-lg appearance-none cursor-pointer outline-none accent-rose-500 transition-all duration-200">
                        </div>

                        <select id="speedSelector" class="bg-white/5 border border-white/10 text-slate-200 text-xs px-2.5 py-1 rounded-lg outline-none cursor-pointer font-bold hover:bg-white/10">
                            <option value="0.5" class="bg-slate-950">0.5x</option>
                            <option value="1" class="bg-slate-950" selected>1.0x Normal</option>
                            <option value="1.5" class="bg-slate-950">1.5x</option>
                            <option value="2" class="bg-slate-950">2.0x</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-4">
                        <button id="pipBtn" class="hover:text-rose-500 text-slate-300 transition-colors cursor-pointer outline-none">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0v12m0-12L8 19M8 19H3m5 0V14" /></svg>
                        </button>
                        <button id="fullscreenBtn" class="hover:text-rose-500 text-white transition-colors cursor-pointer outline-none">
                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-5h-4m4 0v4m0-4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full blur-panel p-6 rounded-3xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-6 mt-6">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <span class="text-[9px] font-black tracking-widest bg-rose-500/10 text-rose-400 px-2.5 py-0.5 rounded-md border border-rose-500/20 uppercase">4K STREAM LAYER</span>
                    <span class="text-[9px] font-black tracking-widest bg-emerald-500/10 text-emerald-400 px-2.5 py-0.5 rounded-md border border-emerald-500/20 uppercase">PROXY DEPLOYED</span>
                </div>
                <h2 id="videoTitle" class="text-xl font-bold text-white tracking-tight">Syncing Stream Core...</h2>
                <p id="fileNameSubtitle" class="text-xs text-slate-400 font-medium break-all max-w-lg">Filename profile active.</p>
            </div>

            <button id="ultimateDownloadBtn" class="w-full sm:w-auto flex items-center justify-center gap-3 bg-gradient-to-r from-rose-500 via-pink-600 to-purple-600 hover:opacity-95 active:scale-95 text-white font-bold px-8 py-4 rounded-2xl transition-all shadow-xl shadow-rose-500/25 cursor-pointer text-sm tracking-wide shrink-0 outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Video
            </button>
        </div>
    </main>

    <footer class="w-full text-center py-4 text-[10px] text-slate-600 font-extrabold tracking-widest">
        CINEPLEX MASTER ARCHITECTURE V7.0
    </footer>

    <script>
        const video = document.getElementById('mainPlayer');
        const videoWrapper = document.getElementById('videoWrapper');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const seekBar = document.getElementById('seekBar');
        const currentTimeText = document.getElementById('currentTime');
        const durationTimeText = document.getElementById('durationTime');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSelector = document.getElementById('speedSelector');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const pipBtn = document.getElementById('pipBtn');

        let rawStreamUrl = "";
        let customFileName = "";

        function initAppEngine() {
            const params = new URLSearchParams(window.location.search);
            rawStreamUrl = params.get('url');
            customFileName = params.get('name');

            if (!rawStreamUrl || !customFileName) {
                document.getElementById('videoTitle').innerText = "FATAL: Config Vector Missing.";
                return;
            }

            rawStreamUrl = decodeURIComponent(rawStreamUrl);
            customFileName = decodeURIComponent(customFileName);

            document.getElementById('videoTitle').innerText = customFileName.replace(/\.[^/.]+$/, "").replace(/_/g, " ");
            document.getElementById('fileNameSubtitle').innerText = "Target Save Name: " + customFileName;
            
            video.src = rawStreamUrl;
            video.load();
        }

        function togglePlayback() {
            if (video.paused) {
                video.play().catch(e => console.log("Playback error"));
                playPauseBtn.innerHTML = '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                document.getElementById('centerPlayIcon').innerHTML = '<svg class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6"/></svg>';
            } else {
                video.pause();
                playPauseBtn.innerHTML = '<svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>';
                document.getElementById('centerPlayIcon').innerHTML = '<svg class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>';
            }
        }

        function formatTimeLayout(seconds) {
            if (isNaN(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${mins}:${secs}`;
        }

        video.addEventListener('timeupdate', () => {
            if (!isNaN(video.duration) && video.duration > 0) {
                seekBar.value = (video.currentTime / video.duration) * 100;
                currentTimeText.innerText = formatTimeLayout(video.currentTime);
            }
        });

        video.addEventListener('loadedmetadata', () => {
            durationTimeText.innerText = formatTimeLayout(video.duration);
        });

        seekBar.addEventListener('input', () => {
            if (!isNaN(video.duration)) {
                video.currentTime = (seekBar.value / 100) * video.duration;
            }
        });

        video.addEventListener('click', togglePlayback);
        playPauseBtn.addEventListener('click', togglePlayback);
        volumeSlider.addEventListener('input', () => { video.volume = volumeSlider.value; });
        speedSelector.addEventListener('change', () => { video.playbackRate = parseFloat(speedSelector.value); });
        pipBtn.addEventListener('click', () => { video.requestPictureInPicture().catch(e => {}); });
        
        video.addEventListener('dblclick', (e) => {
            e.preventDefault();
            if (!document.fullscreenElement) videoWrapper.requestFullscreen().catch(e => {});
            else document.exitFullscreen();
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) videoWrapper.requestFullscreen().catch(e => {});
            else document.exitFullscreen();
        });

        // ====================================================================
        // 🔮 THREE-TIER DEEP BYPASS PROXY ENGINE (ULTIMATE NAME-FORCE METHOD)
        // ====================================================================
        document.getElementById('ultimateDownloadBtn').addEventListener('click', async function() {
            const btn = this;
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-2 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg> Bypassing CORS...`;
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none";

            // মেথড ১: ডিরেক্ট লোকাল মেমোরি ব্লব ইনজেকশন (যদি কোনো সিকিউরিটি না থাকে)
            try {
                const response = await fetch(rawStreamUrl);
                if (!response.ok) throw new Error("Direct Fetch Blocked");
                const blob = await response.blob();
                triggerLocalDownload(blob, customFileName, btn, originalText);
                return;
            } catch (e) {
                console.log("Method 1 Failed. Launching Method 2: High-Speed Reverse Proxy...");
            }

            // মেথড ২: উন্মুক্ত অল-অরিজিন্স রিভার্স প্রক্সি টানেলিং (CORS হেডার মুছে ফেলার ট্রিক)
            try {
                btn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 mr-2 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg> Proxy Tunnelling...`;
                
                const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawStreamUrl);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy Rejected");
                const blob = await response.blob();
                triggerLocalDownload(blob, customFileName, btn, originalText);
                return;
            } catch (e) {
                console.log("Method 2 Failed. Launching Method 3: Backup Proxy...");
            }

            // মেথড ৩: অল্টারনেটিভ প্রক্সি প্লাস ব্রাউজার স্ট্রিম এক্সটেনশন
            try {
                const altProxyUrl = "https://cors-anywhere.herokuapp.com/" + rawStreamUrl;
                const response = await fetch(altProxyUrl);
                if (!response.ok) throw new Error("All Proxies Exhausted");
                const blob = await response.blob();
                triggerLocalDownload(blob, customFileName, btn, originalText);
                return;
            } catch (e) {
                // চরম ব্যর্থতার ক্ষেত্রে (যদি কোনো প্রক্সিই ফাইল রিড করতে না পারে), ব্রাউজারকে ডিরেক্ট ফোর্স করা হবে নতুন ট্যাবে ডাউনলোড উইন্ডো রান করার জন্য।
                console.log("All algorithmic firewalls active. Reverting to direct stream link injection.");
                alert("সবগুলো সিকিউরিটি বাইপাস প্রক্সি চেষ্টা করা হয়েছে। ভিডিও প্রোভাইডার সার্ভারের হার্ডওয়্যার ব্লকের কারণে ফাইলটি ব্রাউজারের অরিজিনাল নামেই সেভ হতে পারে।");
                
                const backupLink = document.createElement('a');
                backupLink.href = rawStreamUrl;
                backupLink.setAttribute('download', customFileName);
                backupLink.setAttribute('target', '_blank'); 
                backupLink.rel = "noopener noreferrer";
                document.body.appendChild(backupLink);
                backupLink.click();
                document.body.removeChild(backupLink);
                
                btn.innerHTML = originalText;
                btn.style.opacity = "1";
                btn.style.pointerEvents = "auto";
            }
        });

        // ব্রাউজারের প্রোটোকলকে ধোঁকা দিয়ে কাস্টম নামে ফাইল সেভ করার কোর ইঞ্জিন
        function triggerLocalDownload(blob, filename, btn, originalText) {
            const blobUrl = window.URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = blobUrl;
            anchor.setAttribute('download', filename);
            document.body.appendChild(anchor);
            anchor.click();
            
            // ক্লিনআপ ও রিসেট
            document.body.removeChild(anchor);
            window.URL.revokeObjectURL(blobUrl);
            btn.innerHTML = originalText;
            btn.style.opacity = "1";
            btn.style.pointerEvents = "auto";
        }

        window.onload = initAppEngine;
    </script>
</body>
</html>
